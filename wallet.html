<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFEORA Wallet</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0b0f1a;
  font-family:'Inter',sans-serif;
  color:white;
}

.container{
  max-width:480px;
  margin:auto;
  padding:16px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:42px;
  height:42px;
  border-radius:50%;
}

.logo h2{
  margin:0;
  font-size:20px;
}

.refresh{
  font-size:20px;
  cursor:pointer;
}

/* CARD */
.card{
  margin-top:20px;
  padding:20px;
  border-radius:25px;
  background:linear-gradient(135deg,#1e293b,#0f172a);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.balance{
  font-size:34px;
  font-weight:800;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:18px;
  text-align:center;
  font-weight:600;
}

.deposit{background:#22c55e;}
.withdraw{background:#3b82f6;}
.history{background:#8b5cf6;}

/* ASSETS */
.asset{
  background:#111827;
  padding:15px;
  border-radius:18px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left{
  display:flex;
  gap:10px;
  align-items:center;
}

.icon{
  width:42px;
  height:42px;
  border-radius:50%;
}

.name{font-weight:600;}
.symbol{font-size:12px;color:#6b7280;}

.api-box{
  margin-top:20px;
  background:#111827;
  padding:15px;
  border-radius:20px;
}

button{
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="https://iili.io/BDk3VLl.jpg">
    <h2>SAFEORA</h2>
  </div>
  <div class="refresh" onclick="loadBalance()">⟳</div>
</div>

<!-- BALANCE -->
<div class="card">
  <div>Total Balance</div>
  <div class="balance" id="totalUsd">$0.00</div>

  <div class="actions">
    <div class="btn deposit" onclick="openDeposit()">Deposit</div>
    <div class="btn withdraw" onclick="openWithdraw()">Withdraw</div>
    <div class="btn history" onclick="loadHistory()">History</div>
  </div>
</div>

<!-- TON -->
<div class="asset">
  <div class="left">
    <img class="icon" src="https://iili.io/BmeGc8l.jpg">
    <div>
      <div class="name">TON</div>
      <div class="symbol">TON Coin</div>
    </div>
  </div>
  <div>
    <div id="tonBalance">0</div>
    <div id="tonUsd">$0</div>
  </div>
</div>

<!-- USDT -->
<div class="asset">
  <div class="left">
    <img class="icon" src="https://iili.io/Bme5zTG.jpg">
    <div>
      <div class="name">USDT</div>
      <div class="symbol">Tether</div>
    </div>
  </div>
  <div>
    <div id="usdtBalance">0</div>
    <div id="usdtUsd">$0</div>
  </div>
</div>

<!-- API -->
<div class="api-box">
  <b>API Access</b><br><br>
  <button onclick="createApi()">Generate API</button>
  <div id="apiKey"></div>
</div>

</div>

<script>

const API = "https://safeora.onrender.com"
let API_KEY = localStorage.getItem("key")

async function createApi(){
  let id = prompt("Enter User ID")
  let res = await fetch(API+"/api/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user_id:id})
  })

  let data = await res.json()
  API_KEY = data.api_key
  localStorage.setItem("key",API_KEY)

  document.getElementById("apiKey").innerText = API_KEY
}

async function loadBalance(){
  if(!API_KEY) return;

  let res = await fetch(API+"/api/balance",{
    headers:{"x-api-key":API_KEY}
  })

  let d = await res.json()

  let ton = d.balance || 0

  document.getElementById("tonBalance").innerText = ton
  document.getElementById("tonUsd").innerText = "$"+(ton*5)

  document.getElementById("totalUsd").innerText = "$"+(ton*5)
}

function openDeposit(){
  alert("Deposit UI coming next 😎")
}

function openWithdraw(){
  let amount = prompt("Amount")
  let address = prompt("TON Address")

  fetch(API+"/api/withdraw",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":API_KEY
    },
    body:JSON.stringify({amount,address})
  }).then(r=>r.json()).then(d=>{
    alert(d.message)
    loadBalance()
  })
}

function loadHistory(){
  alert("History coming next")
}

loadBalance()

</script>

</body>
</html>
