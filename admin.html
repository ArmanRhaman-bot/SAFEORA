<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFEORA Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  background:#0a0c12;
  color:#fff;
  font-family:'Inter',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:400px;
  background:#111827;
  padding:25px;
  border-radius:20px;
  border:1px solid #1f2a44;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
  background:#1e293b;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#3b82f6;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.result{
  margin-top:15px;
  font-size:0.85rem;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">
  <h2>Admin Add Balance</h2>

  <input id="userId" placeholder="User ID">
  <input id="amount" placeholder="Amount (TON)">
  <input id="secret" placeholder="Admin Secret">

  <button onclick="addBalance()">Add Balance</button>

  <div class="result" id="result"></div>
</div>

<script>

const API = "https://safeora.onrender.com"; // তোমার backend URL

async function addBalance(){

  let user_id = document.getElementById("userId").value;
  let amount = document.getElementById("amount").value;
  let secret = document.getElementById("secret").value;

  if(!user_id || !amount || !secret){
    alert("সব ফিল্ড পূরণ কর");
    return;
  }

  try{
    const res = await fetch(API + "/admin/add-balance",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "admin-secret": secret
      },
      body: JSON.stringify({
        user_id: user_id,
        amount: parseFloat(amount)
      })
    });

    const data = await res.json();

    if(data.success){
      document.getElementById("result").innerHTML =
      "✅ Success<br>User: "+data.user_id+
      "<br>New Balance: "+data.new_balance+" TON";
    }else{
      document.getElementById("result").innerHTML =
      "❌ "+data.error;
    }

  }catch(e){
    document.getElementById("result").innerHTML =
    "Error: "+e.message;
  }
}

</script>

</body>
</html>
