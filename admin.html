<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFEORA Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  background:#0a0c12;
  color:#fff;
  font-family:'Inter',sans-serif;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  border:1px solid #1f2a44;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:#fff;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.btn{
  background:#3b82f6;
  color:white;
}

.btn-red{
  background:#ef4444;
  color:white;
}

.btn-green{
  background:#10b981;
  color:white;
}

.user-box{
  padding:10px;
  background:#1e293b;
  border-radius:12px;
  margin-top:10px;
}

.tx{
  font-size:0.8rem;
  border-bottom:1px solid #1f2a44;
  padding:6px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>🔥 SAFEORA ADMIN PANEL</h2>

<!-- SEARCH USER -->
<div class="card">
  <h3>🔍 Find User</h3>
  <input id="searchUser" placeholder="Enter User ID">
  <input id="adminSecret" placeholder="Admin Secret">
  <button class="btn" onclick="getUser()">Load User</button>

  <div id="userData"></div>
</div>

<!-- BALANCE CONTROL -->
<div class="card">
  <h3>💰 Balance Control</h3>
  <input id="balanceUser" placeholder="User ID">
  <input id="amount" placeholder="Amount">

  <button class="btn-green" onclick="addBalance()">➕ Add</button>
  <button class="btn-red" onclick="cutBalance()">➖ Cut</button>
</div>

<!-- ALL USERS -->
<div class="card">
  <h3>👥 All Users</h3>
  <button class="btn" onclick="loadUsers()">Load All</button>
  <div id="usersList"></div>
</div>

</div>

<script>

const API = "https://safeora.onrender.com";

// ================= GET USER =================
async function getUser(){
  let userId = document.getElementById("searchUser").value;
  let secret = document.getElementById("adminSecret").value;

  const res = await fetch(API+"/admin/users",{
    headers:{ "admin-secret": secret }
  });

  const data = await res.json();

  let user = data.users.find(u => u.user_id == userId);

  if(!user){
    alert("User not found");
    return;
  }

  document.getElementById("userData").innerHTML = `
  <div class="user-box">
  👤 ${user.user_id}<br>
  💰 Balance: ${user.balance} TON<br>
  🧾 TX Count: ${user.tx_count}
  </div>
  `;

  loadTransactions(user.user_id, secret);
}

// ================= LOAD ALL USERS =================
async function loadUsers(){
  let secret = document.getElementById("adminSecret").value;

  const res = await fetch(API+"/admin/users",{
    headers:{ "admin-secret": secret }
  });

  const data = await res.json();

  let html = "";

  data.users.forEach(u=>{
    html += `
    <div class="user-box">
      ${u.user_id} - ${u.balance} TON
    </div>`;
  });

  document.getElementById("usersList").innerHTML = html;
}

// ================= ADD BALANCE =================
async function addBalance(){
  let user_id = document.getElementById("balanceUser").value;
  let amount = document.getElementById("amount").value;
  let secret = document.getElementById("adminSecret").value;

  await fetch(API+"/admin/add-balance",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "admin-secret": secret
    },
    body: JSON.stringify({ user_id, amount: parseFloat(amount) })
  });

  alert("Balance Added");
}

// ================= CUT BALANCE =================
async function cutBalance(){
  let user_id = document.getElementById("balanceUser").value;
  let amount = document.getElementById("amount").value;
  let secret = document.getElementById("adminSecret").value;

  await fetch(API+"/admin/add-balance",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "admin-secret": secret
    },
    body: JSON.stringify({ user_id, amount: -Math.abs(amount) })
  });

  alert("Balance Deducted");
}

// ================= LOAD TRANSACTIONS =================
async function loadTransactions(userId, secret){

  const res = await fetch(API+"/admin/users",{
    headers:{ "admin-secret": secret }
  });

  const data = await res.json();

  let user = data.users.find(u => u.user_id == userId);

  if(!user) return;

  let html = "<h4>📜 Transactions</h4>";

  // NOTE: backend change needed for full tx
  html += "<div>⚠️ Transaction details need backend update</div>";

  document.getElementById("userData").innerHTML += html;
}

</script>

</body>
</html>
